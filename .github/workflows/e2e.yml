name: E2E

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC — off the hour, be a reasonable citizen
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Pytest (e2e, against the real live site)
        run: pytest -m e2e --no-cov
